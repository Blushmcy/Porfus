<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Love 💙</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'Segoe UI', sans-serif;
}

canvas{ display:block; }

/* CONTROLES */
.controls{
  position:fixed;
  bottom:15px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.btn{
  width:65px;
  height:65px;
  border-radius:50%;
  background:#ffffffcc;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
}

/* OVERLAY */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:25px;
}

/* CARTA */
.envelope{
  width:220px;
  height:150px;
  background:#e8d5b7;
  border-radius:12px;
  position:relative;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:34px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
  <div class="btn" id="left">⬅️</div>
  <div class="btn" id="jump">⬆️</div>
  <div class="btn" id="right">➡️</div>
</div>

<div id="overlay" class="screen" style="display:none;"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let player = {x:100,y:300,w:40,h:40,vy:0,jumping:false};
let gravity=0.8;
let level=1;
let cameraX=0;

let obstacles=[];
let flag={x:1200,y:280};

/* CONTROLES */
let keys={left:false,right:false};
left.ontouchstart=()=>keys.left=true;
left.ontouchend=()=>keys.left=false;
right.ontouchstart=()=>keys.right=true;
right.ontouchend=()=>keys.right=false;
jump.ontouchstart=()=>{
 if(!player.jumping){
  player.vy=-15;
  player.jumping=true;
 }
};

/* FONDOS */
function background(){
 if(level==1){
  ctx.fillStyle="#9be7a5"; // bosque
 }
 if(level==2){
  ctx.fillStyle="#ffb07c"; // otoño
 }
 if(level==3){
  ctx.fillStyle="#1e1e3f"; // noche
 }
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // flores aesthetic
 for(let i=0;i<20;i++){
  let x=i*150-cameraX*0.5;
  ctx.fillStyle="pink";
  ctx.beginPath();
  ctx.arc(x,350,5,0,Math.PI*2);
  ctx.fill();
 }

 // estrellas nivel 3
 if(level==3){
  for(let i=0;i<50;i++){
   ctx.fillStyle="white";
   ctx.fillRect(Math.random()*canvas.width,Math.random()*200,2,2);
  }
 }
}

/* DINO TIERNO */
function drawPlayer(){
 let x=player.x-cameraX;

 ctx.fillStyle="#6ec1ff";
 ctx.fillRect(x,player.y,40,40);

 // ojo cute
 ctx.fillStyle="white";
 ctx.fillRect(x+10,player.y+10,12,12);
 ctx.fillStyle="black";
 ctx.fillRect(x+14,player.y+14,5,5);

 // cachetes
 ctx.fillStyle="pink";
 ctx.fillRect(x+5,player.y+25,8,5);
 ctx.fillRect(x+25,player.y+25,8,5);

 if(level==2){
  ctx.fillStyle="green";
  ctx.fillRect(x,player.y-10,40,10);
 }
}

/* OBSTÁCULOS */
function generate(){
 obstacles=[];
 for(let i=1;i<8;i++){
  let type;
  if(level==1) type="bush";
  if(level==2) type=(i%2==0)?"chicken":"rabbit";
  if(level==3) type="light";

  obstacles.push({x:i*180+200,y:300,type:type});
 }
}

function drawObstacles(){
 for(let o of obstacles){
  let x=o.x-cameraX;

  if(o.type=="bush"){
   ctx.fillStyle="green";
   ctx.fillRect(x,o.y,30,30);
  }
  if(o.type=="chicken"){
   ctx.fillStyle="white";
   ctx.fillRect(x,o.y,30,30);
  }
  if(o.type=="rabbit"){
   ctx.fillStyle="pink";
   ctx.fillRect(x,o.y,30,30);
  }
  if(o.type=="light"){
   ctx.fillStyle="yellow";
   ctx.beginPath();
   ctx.arc(x,o.y,15,0,Math.PI*2);
   ctx.fill();
  }
 }
}

/* BANDERA */
function drawFlag(){
 let x=flag.x-cameraX;
 ctx.fillStyle="red";
 ctx.fillRect(x,220,10,100);
 ctx.fillStyle="white";
 ctx.fillRect(x,220,40,20);
}

/* UPDATE */
function update(){
 if(keys.left) player.x-=5;
 if(keys.right) player.x+=5;

 player.vy+=gravity;
 player.y+=player.vy;

 if(player.y>300){
  player.y=300;
  player.jumping=false;
 }

 cameraX=player.x-150;

 for(let o of obstacles){
  if(player.x<o.x+30 && player.x+40>o.x && player.y<o.y+30 && player.y+40>o.y){
   alert("perdiste 😭");
   location.reload();
  }
 }

 if(player.x>flag.x){
  nextLevel();
 }
}

/* DRAW */
function draw(){
 background();

 ctx.fillStyle="#3b7d2a";
 ctx.fillRect(0,340,canvas.width,100);

 drawObstacles();
 drawFlag();
 drawPlayer();
}

/* LOOP */
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 update();
 draw();
 requestAnimationFrame(loop);
}

/* NIVELES */
function nextLevel(){
 let o=document.getElementById("overlay");

 if(level==1){
  o.style.display="flex";
  o.innerHTML=`<h2>El tiempo pasa rápido...<br>pero si estoy contigo no me molestaría mirarte hasta que el universo entero empiece a envejecer 💙<br><br>Nivel 2</h2>`;
  setTimeout(()=>{level=2;player.x=100;o.style.display="none";generate();},4000);
 }
 else if(level==2){
  o.style.display="flex";
  o.innerHTML=`<h2>ya falta poco para tu regalo... será lindo? 🎁<br><br>Nivel 3</h2>`;
  setTimeout(()=>{level=3;player.x=100;o.style.display="none";generate();},4000);
 }
 else{
  final();
 }
}

/* FINAL */
function final(){
 let o=document.getElementById("overlay");
 o.style.display="flex";

 o.innerHTML=`
 <button onclick="letter()">continuar?</button>
 <button onclick="location.reload()">salir</button>
 `;
}

function letter(){
 let o=document.getElementById("overlay");

 o.innerHTML=`
 <div class="envelope">
  <div class="heart" onclick="openLetter()">💌</div>
 </div>
 `;
}

function openLetter(){
 overlay.innerHTML=`
 <p style="font-style:italic;">
 Sé que llevamos poco tiempo, pero me alegra muchísimo cumplir otro mes más a tu lado.<br><br>
 Nunca imaginé entrar a trabajar a ese lugar y salir de ahí con la persona que más amo.<br><br>
 Estar contigo se siente como una curita al corazón que alegra cada momento de mi vida.<br><br>
 Eres una persona muy bella por dentro y por fuera.<br><br>
 Si pudiera te llevaría siempre conmigo.<br><br>
 No existen palabras suficientes para decir cuánto te amo, mi querido John.
 </p>
 `;
}

/* INIT */
generate();
loop();
</script>

</body>
</html>
