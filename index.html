<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Love Game 💙</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'Courier New', monospace;
}

canvas{ display:block; }

/* Controles */
.controls{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.btn{
  width:65px;
  height:65px;
  border-radius:50%;
  background:#ffffffcc;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
}

/* Pantallas */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
}

/* Carta */
.envelope{
  width:200px;
  height:140px;
  background:#e8d5b7;
  border-radius:10px;
  position:relative;
}

.heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
  <div class="btn" id="left">⬅️</div>
  <div class="btn" id="jump">⬆️</div>
  <div class="btn" id="right">➡️</div>
</div>

<div id="overlay" class="screen" style="display:none;"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* PLAYER */
let player = {x:100,y:300,w:40,h:40,vy:0,jumping:false};
let gravity = 0.8;
let level = 1;
let cameraX = 0;

let obstacles = [];
let flag = {x:2500,y:280};

/* CONTROLES */
let keys={left:false,right:false};

left.ontouchstart=()=>keys.left=true;
left.ontouchend=()=>keys.left=false;
right.ontouchstart=()=>keys.right=true;
right.ontouchend=()=>keys.right=false;

jump.ontouchstart=()=>{
 if(!player.jumping){
   player.vy=-15;
   player.jumping=true;
 }
};

/* FONDOS PIXEL */
function drawBackground(){
  if(level==1){
    ctx.fillStyle="#7ec850"; // bosque
  }
  if(level==2){
    ctx.fillStyle="#f4a460"; // otoño
  }
  if(level==3){
    ctx.fillStyle="#1a1a40"; // noche
  }
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // árboles pixel
  for(let i=0;i<20;i++){
    let x=i*200 - cameraX*0.5;
    ctx.fillStyle="#2e7d32";
    ctx.fillRect(x,200,40,100);
  }

  // casa simple
  ctx.fillStyle="#8b5a2b";
  ctx.fillRect(400-cameraX*0.5,250,100,80);
}

/* DINO PIXEL */
function drawPlayer(){
  ctx.fillStyle="#4da6ff";
  ctx.fillRect(player.x-cameraX,player.y,40,40);

  ctx.fillStyle="white";
  ctx.fillRect(player.x-cameraX+8,player.y+8,10,10);

  if(level==2){
    ctx.fillStyle="green";
    ctx.fillRect(player.x-cameraX,player.y-10,40,10);
  }
}

/* OBSTÁCULOS */
function generateObstacles(){
  obstacles=[];
  for(let i=1;i<10;i++){
    let type;

    if(level==1) type="rock";
    if(level==2) type=(i%2==0)?"chicken":"rabbit";
    if(level==3) type="light";

    obstacles.push({
      x:i*300+400,
      y:300,
      w:30,
      h:30,
      type:type
    });
  }
}

/* DIBUJAR OBSTÁCULOS */
function drawObstacles(){
  for(let o of obstacles){
    let x=o.x-cameraX;

    if(o.type=="rock"){
      ctx.fillStyle="#555";
      ctx.fillRect(x,o.y,30,30);
    }

    if(o.type=="chicken"){
      ctx.fillStyle="white";
      ctx.fillRect(x,o.y,30,30);
    }

    if(o.type=="rabbit"){
      ctx.fillStyle="pink";
      ctx.fillRect(x,o.y,30,30);
    }

    if(o.type=="light"){
      ctx.fillStyle="yellow";
      ctx.beginPath();
      ctx.arc(x,o.y,15,0,Math.PI*2);
      ctx.fill();
    }
  }
}

/* BANDERA */
function drawFlag(){
  let x=flag.x-cameraX;
  ctx.fillStyle="red";
  ctx.fillRect(x,220,10,100);

  ctx.fillStyle="white";
  ctx.fillRect(x,220,40,20);
}

/* UPDATE */
function update(){
  if(keys.left) player.x-=5;
  if(keys.right) player.x+=5;

  player.vy+=gravity;
  player.y+=player.vy;

  if(player.y>300){
    player.y=300;
    player.jumping=false;
  }

  cameraX = player.x - 150;

  // colisiones
  for(let o of obstacles){
    if(player.x < o.x+30 &&
       player.x+40 > o.x &&
       player.y < o.y+30 &&
       player.y+40 > o.y){
        alert("Perdiste 😭");
        location.reload();
    }
  }

  // bandera
  if(player.x > flag.x){
    nextLevel();
  }
}

/* DRAW */
function draw(){
  drawBackground();

  ctx.fillStyle="#3b7d2a";
  ctx.fillRect(0,340,canvas.width,100);

  drawObstacles();
  drawFlag();
  drawPlayer();
}

/* LOOP */
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  update();
  draw();
  requestAnimationFrame(loop);
}

/* NIVELES */
function nextLevel(){
  let overlay=document.getElementById("overlay");

  if(level==1){
    overlay.style.display="flex";
    overlay.innerHTML=`<h2>El tiempo pasa rápido...<br>pero contigo no me molestaría mirarte hasta que el universo envejezca 💙<br><br>Nivel 2</h2>`;
    setTimeout(()=>{
      overlay.style.display="none";
      level=2;
      player.x=100;
      generateObstacles();
    },4000);
  }

  else if(level==2){
    overlay.style.display="flex";
    overlay.innerHTML=`<h2>Ya falta poco para tu regalo 🎁<br><br>Nivel 3</h2>`;
    setTimeout(()=>{
      overlay.style.display="none";
      level=3;
      player.x=100;
      generateObstacles();
    },4000);
  }

  else{
    finalScreen();
  }
}

/* FINAL */
function finalScreen(){
  let overlay=document.getElementById("overlay");
  overlay.style.display="flex";

  overlay.innerHTML=`
  <h2>💖</h2>
  <button onclick="showLetter()">Continuar</button>
  <button onclick="location.reload()">Salir</button>
  `;
}

function showLetter(){
  let overlay=document.getElementById("overlay");

  overlay.innerHTML=`
  <div class="envelope">
    <div class="heart" onclick="openLetter()">💌</div>
  </div>
  `;
}

function openLetter(){
  overlay.innerHTML=`
  <p style="font-style:italic;">
  Sé que llevamos poco tiempo, pero me alegra muchísimo cumplir otro mes más a tu lado.<br><br>
  Nunca imaginé entrar a trabajar a ese lugar y salir de ahí con la persona que más amo.<br><br>
  Estar contigo se siente como una curita al corazón 💙<br><br>
  Eres una persona muy bella por dentro y por fuera.<br><br>
  Te amo, mi querido John.
  </p>
  `;
}

/* INIT */
generateObstacles();
loop();
</script>

</body>
</html>
